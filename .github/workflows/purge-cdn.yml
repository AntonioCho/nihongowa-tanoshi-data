name: Sync version.json & Purge jsDelivr CDN Cache

on:
  push:
    branches: [main]
    paths:
      - 'vocab.json'
      - 'version.json'

permissions:
  contents: write

jobs:
  sync-and-purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # version.json은 vocab.json의 version 필드에서 자동 생성 —
      # 함께 커밋하는 것을 깜빡해도 여기서 맞춰진다
      - name: Sync version.json from vocab.json
        run: |
          jq -c '{version: .version, updatedAt: .updatedAt}' vocab.json > version.json

      - name: Commit version.json if changed
        run: |
          if ! git diff --quiet version.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add version.json
            git commit -m "chore: sync version.json (v$(jq -r .version vocab.json))"
            git push
          fi

      - name: Purge jsDelivr cache
        run: |
          echo "Purging jsDelivr CDN cache..."
          curl -s "https://purge.jsdelivr.net/gh/AntonioCho/nihongowa-tanoshi-data@main/vocab.json"
          echo ""
          curl -s "https://purge.jsdelivr.net/gh/AntonioCho/nihongowa-tanoshi-data@main/version.json"
          echo ""
          echo "Cache purged successfully"
